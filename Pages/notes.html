<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="/Css/notes.css">
    <!--Defer käsky Scriptissä suorittaa JS:n vasta kun html ja css ovat ladanneet ensin-->
    <script src="/Js/notes.js" defer></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=New+Rocker&display=swap');
    </style>
</head>
<body>
    <!--LÄPINÄKYVÄ MENU-->
    <nav>
    <div class="logo">To Do App</div>
    <div class="menu-toggle" id="menu-toggle">&#9776;</div>
    <ul id="menu">
        <li><a href="/Pages/index.html">Koti</a></li>
        <li><a href="/Pages/notes.html">Muistiinpanot</a></li>
    </ul>
    </nav>

    <header>
        <h1>Quick Notes</h1>
        <div>
            <!--Avaa muistiinpanot-->
            <button class="add-note-btn" onclick="openNoteDialog()"> +Add Note</button>
            <!-- Teeman vaihto nappi-->
            <button id="themeToggleBtn" class="theme-toggle-btn">
                <svg xmlns="http://www.w3.org/2000/svg" height="35px" viewBox="0 -960 960 960" width="35px" fill="#A66583"><path d="m843-60-85-85q-49 30-107 24t-101-49q-29-29-41-66.5t-7-75.5q-38 5-75.5-7T360-360q-29-29-41-66.5t-7-75.5q-38 5-75.5-7T170-550q-43-43-49-101.5T145-759l-85-85 56-56 86 85q49-30 107-24t101 49q29 29 41 66t7 75q38-5 75.5 7.5T600-600q29 29 41 66t7 75q38-5 75.5 7.5T790-410q43 43 49 101t-24 107l85 85-57 57ZM670-200q38 0 64-26t26-64q0-38-26-64t-64-26q-38 0-64 26t-26 64q0 38 26 64t64 26ZM480-390q38 0 64-26t26-64q0-38-26-64t-64-26q-38 0-64 26t-26 64q0 38 26 64t64 26ZM354-606q26-26 26-64t-26-64q-26-26-64-26t-64 26q-26 26-26 64t26 64q26 26 64 26t64-26Zm316 316ZM480-480ZM290-670Z"/></svg>
            </button>
        </div>
    </header>

    <main class="notes-grid" id="notesContainer">

    </main>


    <!--Muistiinpano ikkuna-->
    <dialog id="noteDialog">
        <div id="diolog-content">
            <!--otsikko ja sulkunappi-->
            <div class="dialog-header">
                <h2 class="dialog-title" id="dialogTitle">Add New Note</h2>
                <button class="close-btn" onclick="closeNoteDialog()">x</button>
            </div>

            <!--Title, textarea sekä sulkunappi-->
            <form id="noteForm">
                <div class="form group">
                    <label for="noteTitle" class="form-label"> Title</label>
                    <input type="text" id="noteTitle" class="form-input" placeholder="Enter note title..." required>
                </div>

                <div class="form-group">
                    <label for="noteContent" class="form-label">Content</label>
                    <textarea id="noteContent" class="form-textarea" placeholder="Write your notes here..." required></textarea>
                </div>

                <!--Sulku nappi, sama funktio kuin ylemmässä napissa-->
                <div class="dialog-actions">
                    <button type="button" class="cancel-btn" onclick="closeNoteDialog()">cancel</button>
                    <button type="submit" class="save-btn">Save Note</button>
                </div>


            </form>


        </div>
    </dialog>


<footer>
	<p>
        ph'nglui mglw'nafh Cthulhu R'lyeh wgah'nagl fhtagn.
	</p>
</footer>
</body>
</html>
